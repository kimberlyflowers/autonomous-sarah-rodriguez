# Nixpacks config for ugc-pipeline (lovely-wonder)
# Nixpacks avoids Docker Hub rate limits on Railway's builder IPs.

[phases.setup]
# ffmpeg for video/audio processing; python3 for yt-dlp install
nixPkgs = ["ffmpeg", "python3"]

[phases.install]
cmds = [
  "npm ci --omit=dev",
  "python3 -m pip install yt-dlp --quiet --break-system-packages"
]
