# Nixpacks config for ugc-pipeline (lovely-wonder)
# Nixpacks avoids Docker Hub rate limits on Railway's builder IPs.

[phases.setup]
# ffmpeg for video/audio processing
# python3 + pip for yt-dlp (trend video downloader)
nixPkgs = ["ffmpeg", "python3", "python3Packages.pip"]

[phases.install]
cmds = [
  "npm ci --omit=dev",
  "pip3 install yt-dlp --quiet"
]
