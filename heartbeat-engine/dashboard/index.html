<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bloomie — BLOOM AI Employee</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bloomie" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        background-color: #1a1a1a;
        /* Safe area padding for notch/home indicator */
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        min-height: calc(100% + env(safe-area-inset-top));
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #1a1a1a;
        line-height: 1.5;
        overscroll-behavior: none;
        /* Fix iOS keyboard pushing layout */
        position: fixed;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #root {
        width: 100%;
        height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        /* Use visual viewport height — shrinks when keyboard appears */
        height: 100dvh;
        -webkit-overflow-scrolling: touch;
      }
    </style>

    <script>
      // Visual Viewport API — keeps layout anchored when iOS keyboard appears
      // Without this, the whole page scrolls up when keyboard opens in PWA mode
      if (window.visualViewport) {
        function handleViewportResize() {
          const root = document.getElementById('root');
          if (root) {
            root.style.height = window.visualViewport.height + 'px';
          }
        }
        window.visualViewport.addEventListener('resize', handleViewportResize);
        window.visualViewport.addEventListener('scroll', handleViewportResize);
      }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
