<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover is REQUIRED for iPhone notch/safe area to work as a PWA -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Bloomie — BLOOM AI Employee</title>

    <!-- PWA / Add to Home Screen -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- iOS PWA specific — required for full screen and safe area support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bloomie" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        /* Extend background into safe area on all sides */
        background-color: #1a1a1a;
        /* Push content down so nothing hides under the notch/status bar */
        padding-top: env(safe-area-inset-top);
        padding-right: env(safe-area-inset-right);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        /* Prevent white flash at bottom on rubber-band scroll */
        min-height: calc(100% + env(safe-area-inset-top));
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background-color: #1a1a1a;
        line-height: 1.5;
        /* Prevent overscroll bounce revealing white background */
        overscroll-behavior: none;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh; /* dynamic viewport height — accounts for iOS browser chrome */
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
