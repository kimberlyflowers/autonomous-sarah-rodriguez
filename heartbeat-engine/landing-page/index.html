<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloomie Staffing — AI-Powered Talent Solutions</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f1a;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 780px;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1.25rem;
      color: #a0a0c0;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .cta {
      display: inline-block;
      padding: 0.85rem 2.2rem;
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .cta:hover { opacity: 0.85; }
    .footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #555570;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">Bloomie Staffing</div>
    <p class="tagline">AI-powered staffing and operations — so your team can focus on what matters.</p>
    <a class="cta" href="https://app.bloomiestaffing.com">Open Dashboard</a>
  </div>
  <div class="footer">&copy; 2026 Bloomie Staffing. All rights reserved.</div>
</body>
</html>
